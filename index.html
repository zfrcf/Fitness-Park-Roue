<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Park - Tente ta chance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --fp-yellow: #ffde00;
            --fp-black-nav: #1c1f22;
            --fp-bg: #000000;
        }

        body {
            background-color: var(--fp-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION OFFICIELLE --- */
        nav {
            width: 100%;
            background-color: var(--fp-black-nav);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            box-sizing: border-box;
            height: 70px;
        }

        .nav-left { display: flex; align-items: center; gap: 40px; }
        .logo-fp { height: 35px; cursor: pointer; }

        .nav-links {
            display: flex;
            gap: 25px;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        /* Style des liens */
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            transition: 0.3s; 
        }
        
        .nav-links a:hover { 
            color: var(--fp-yellow); 
        }

        .nav-right { display: flex; align-items: center; gap: 25px; }
        
        .btn-login-trigger { 
            color: white; 
            text-decoration: underline; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        .btn-register-trigger {
            background-color: var(--fp-yellow);
            color: black;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border: none;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }

        /* --- MODALE DE CONNEXION --- */
        #auth-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: #111;
            padding: 40px;
            border-radius: 2px;
            border: 1px solid #333;
            width: 350px;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            color: white; font-size: 24px; cursor: pointer;
        }

        .login-box h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
            border-radius: 4px;
        }

        /* --- ZONE DE JEU --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
        }

        .wheel-container {
            position: relative;
            width: min(90vw, 450px);
            height: min(90vw, 450px);
        }

        #wheel-svg {
            width: 100%; height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .marker {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--fp-yellow);
            z-index: 10;
        }

        .spin-btn {
            margin-top: 40px;
            background: var(--fp-yellow);
            border: none;
            padding: 18px 50px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #bfa700;
        }

        .spin-btn:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="https://www.fitnesspark.fr/"><img src="https://d1nwmbf35sn2fq.cloudfront.net/s3fs-public/2025-12/LOGO_FITNESS%20PARK_WHITE_2020_FR%20%281%29%20%281%29.svg?VersionId=c9xFUFsleMk4wk4mV8FfPEzY8KueB1XW" alt="Fitness Park" class="logo-fp"></a>
            <div class="nav-links">
                <a href="https://www.fitnesspark.fr/nos-offres/">Abonnements</a>
                <a href="https://www.fitnesspark.fr/activites/">Activités & Options</a>
                <a href="https://www.fitnesspark.fr/club/">Nos Clubs</a>
                <a href="https://www.fitnesspark.fr/level-up/">Level Up</a>
            </div>
        </div>
        <div class="nav-right">
            <span class="btn-login-trigger" onclick="openAuth('connexion')">Se connecter</span>
            <button class="btn-register-trigger" onclick="openAuth('inscription')">Je m'inscris</button>
        </div>
    </nav>

    <div id="auth-overlay">
        <div class="login-box">
            <span class="close-btn" onclick="closeAuth()">&times;</span>
            <h3 id="auth-title">Connexion</h3>
            <input type="email" placeholder="Adresse e-mail">
            <input type="password" placeholder="Mot de passe">
            <button class="btn-register-trigger" style="width:100%; margin-top:10px; font-style: normal;">Valider</button>
        </div>
    </div>

    <div class="hero">
        <h1 class="title-main">TENTE TA <span style="color:var(--fp-yellow)">CHANCE !</span></h1>
        
        <div class="wheel-container">
            <div class="marker"></div>
            <svg id="wheel-svg" viewBox="0 0 400 400"></svg>
        </div>

        <button class="spin-btn" id="spin-btn">Faire tourner</button>
        <h2 id="result" style="color:var(--fp-yellow); font-family:'Oswald'; margin-top:30px; height:40px;"></h2>
    </div>

    <script>
        // Fonctions d'affichage de la connexion
        function openAuth(mode) {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('auth-title').innerText = (mode === 'connexion') ? 'Connexion' : 'Inscription';
        }

        function closeAuth() {
            document.getElementById('auth-overlay').style.display = 'none';
        }

        // Configuration de la roue (SVG)
        const rewards = ["1 MOIS OFFERT", "GOURDE FP", "DÉFI POMPES", "SERVIETTE", "4 SEMAINES", "SHAKER", "COACHING 1H", "DÉFI CHAISE", "ACCÈS VIP", "SURPRISE"];
        const svg = document.getElementById('wheel-svg');
        const spinBtn = document.getElementById('spin-btn');
        let currentRotation = 0;

        function drawWheel() {
            const step = 360 / rewards.length;
            rewards.forEach((text, i) => {
                const angle = i * step;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const x1 = 200 + 190 * Math.cos(Math.PI * angle / 180);
                const y1 = 200 + 190 * Math.sin(Math.PI * angle / 180);
                const x2 = 200 + 190 * Math.cos(Math.PI * (angle + step) / 180);
                const y2 = 200 + 190 * Math.sin(Math.PI * (angle + step) / 180);
                
                path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 190 190 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", i % 2 === 0 ? "#111" : "#1a1a1a");
                path.setAttribute("stroke", "#333");
                svg.appendChild(path);

                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", "310"); t.setAttribute("y", "205");
                t.setAttribute("fill", i % 2 === 0 ? "white" : "#ffde00");
                t.setAttribute("font-size", "10"); t.setAttribute("font-weight", "900");
                t.setAttribute("transform", `rotate(${angle + step/2}, 200, 200)`);
                t.textContent = text;
                svg.appendChild(t);
            });
        }

        drawWheel();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            const spin = Math.floor(Math.random() * 360) + 3600;
            currentRotation += spin;
            svg.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                spinBtn.disabled = false;
                const final = (360 - (currentRotation % 360)) % 360;
                const idx = Math.floor(final / (360 / rewards.length));
                document.getElementById('result').innerText = "GAGNÉ : " + rewards[idx];
            }, 5000);
        };
    </script>
</body>
</html>
