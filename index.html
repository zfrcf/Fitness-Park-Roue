<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Park - Ultimate Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fp-yellow: #ffde00; --fp-bg: #000; }
        body { 
            background: var(--fp-bg); 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .logo { width: 320px; margin: 30px 0; }
        .title { font-family: 'Oswald'; text-transform: uppercase; font-size: 2.8rem; text-align: center; margin-bottom: 50px; letter-spacing: 1px; }

        /* --- CONTENEUR DE LA ROUE --- */
        .wheel-area {
            position: relative;
            width: 450px;
            height: 450px;
            max-width: 95vw;
            max-height: 95vw;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* L'AIGUILLE JAUNE A DROITE */
        .indicator {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 50px;
            background: var(--fp-yellow);
            clip-path: polygon(100% 50%, 0 0, 0 100%);
            z-index: 10;
            filter: drop-shadow(-5px 0 10px rgba(0,0,0,0.5));
        }

        /* BOUTON ET FORMULAIRE */
        .spin-btn { 
            margin-top: 50px; 
            background: var(--fp-yellow); 
            border: none; 
            padding: 20px 60px; 
            font-family: 'Oswald'; 
            font-size: 2rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 6px 0 #bfa700;
        }
        .spin-btn:active { transform: translateY(3px); box-shadow: none; }
        .spin-btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        #form-container { 
            display: none; 
            background: #111; 
            padding: 30px; 
            border: 2px solid var(--fp-yellow); 
            margin-top: 30px; 
            width: 350px; 
            text-align: center;
            border-radius: 4px;
        }
        .win-title { font-family: 'Oswald'; font-size: 2rem; color: var(--fp-yellow); margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; box-sizing: border-box; font-size: 1rem; }
        .submit-btn { background: var(--fp-yellow); border: none; width: 100%; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <img src="https://d1nwmbf35sn2fq.cloudfront.net/s3fs-public/2025-12/LOGO_FITNESS%20PARK_WHITE_2020_FR%20%281%29%20%281%29.svg?VersionId=c9xFUFsleMk4wk4mV8FfPEzY8KueB1XW" class="logo">
    
    <div class="title">TENTE TA <span style="color:var(--fp-yellow)">CHANCE</span></div>

    <div class="wheel-area">
        <div class="indicator"></div>
        <svg id="wheel-svg" viewBox="0 0 400 400">
            </svg>
    </div>

    <button class="spin-btn" id="spinBtn">Lancer la roue</button>

    <div id="form-container">
        <div class="win-title">LOT GAGNÉ !</div>
        <p id="lot-text" style="font-size: 1.3rem; margin-bottom: 20px; font-weight: 900;"></p>
        <input type="text" id="nom" placeholder="NOM">
        <input type="text" id="prenom" placeholder="PRÉNOM">
        <input type="tel" id="tel" placeholder="TÉLÉPHONE">
        <button class="submit-btn" id="saveBtn">Valider mon gain</button>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, serverTimestamp } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyA6RIWqdkWkIYYNXdRXfY84ocfMHuyaKkk",
            authDomain: "fitness-park-roue.firebaseapp.com",
            projectId: "fitness-park-roue",
            storageBucket: "fitness-park-roue.firebasestorage.app",
            messagingSenderId: "393113227879",
            appId: "1:393113227879:web:0c73a9276b29ef8103bac2",
            measurementId: "G-FWRZGVQKXF"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const rewards = [
            { label: "SERVIETTE FP", weight: 60 },
            { label: "T-SHIRT FP", weight: 30 },
            { label: "SAC À DOS FP", weight: 10 },
            { label: "3M ULTIMATE", weight: 1 },
            { label: "3M ACCESS", weight: 0.5 },
            { label: "1 MOIS OFFERT", weight: 0.1 },
            { label: "2 MOIS OFFERT", weight: 0.05 },
            { label: "3 MOIS OFFERT", weight: 0.01 },
            { label: "6 MOIS OFFERT", weight: 0.001 }
        ];

        const svg = document.getElementById("wheel-svg");
        const numSlices = rewards.length;
        const sliceAngle = 360 / numSlices;

        // Génération visuelle du SVG (Méthode géométrique pure)
        function createWheel() {
            rewards.forEach((reward, i) => {
                const startAngle = i * sliceAngle;
                const endAngle = (i + 1) * sliceAngle;
                
                // Coordonnées pour le quartier
                const x1 = 200 + 190 * Math.cos(Math.PI * startAngle / 180);
                const y1 = 200 + 190 * Math.sin(Math.PI * startAngle / 180);
                const x2 = 200 + 190 * Math.cos(Math.PI * endAngle / 180);
                const y2 = 200 + 190 * Math.sin(Math.PI * endAngle / 180);

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 190 190 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", i % 2 === 0 ? "#111" : "#1a1a1a");
                path.setAttribute("stroke", "#333");
                svg.appendChild(path);

                // Texte
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                const textAngle = startAngle + sliceAngle / 2;
                text.setAttribute("x", "310");
                text.setAttribute("y", "205");
                text.setAttribute("fill", i % 2 === 0 ? "white" : "var(--fp-yellow)");
                text.setAttribute("font-size", "8");
                text.setAttribute("font-weight", "900");
                text.setAttribute("transform", `rotate(${textAngle}, 200, 200)`);
                text.textContent = reward.label;
                svg.appendChild(text);
            });
        }
        createWheel();

        let rotation = 0;
        let finalLot = "";

        document.getElementById("spinBtn").onclick = () => {
            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            // Tirage au sort par poids
            const totalWeight = rewards.reduce((sum, r) => sum + r.weight, 0);
            let random = Math.random() * totalWeight;
            let winIdx = 0;
            for (let i = 0; i < rewards.length; i++) {
                if (random < rewards[i].weight) { winIdx = i; break; }
                random -= rewards[i].weight;
            }
            finalLot = rewards[winIdx].label;

            // Calcul de l'angle pour que le lot arrive face à la flèche à DROITE (0°)
            const extraSpins = 360 * 10; // 10 tours
            const stopAngle = 360 - (winIdx * sliceAngle);
            rotation += extraSpins + stopAngle;

            svg.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                document.getElementById("form-container").style.display = "block";
                document.getElementById("lot-text").innerText = finalLot;
                btn.style.display = "none";
            }, 6200);
        };

        document.getElementById("saveBtn").onclick = async () => {
            const nom = document.getElementById("nom").value;
            const prenom = document.getElementById("prenom").value;
            const tel = document.getElementById("tel").value;

            if (!nom || !prenom || !tel) return alert("Merci de remplir tous les champs.");

            try {
                await addDoc(collection(db, "gagnants"), {
                    nom, prenom, tel, lot: finalLot, date: serverTimestamp()
                });
                alert("Lot enregistré avec succès ! Présentez cet écran à l'accueil.");
                location.reload();
            } catch (e) {
                alert("Erreur de connexion Firebase.");
            }
        };
    </script>
</body>
</html>
