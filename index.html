<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Park - Tente ta chance !</title>
    <style>
        /* STYLE FITNESS PARK */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap');

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 0;
            text-align: center;
        }

        h1 span {
            color: #ffde00; /* Le jaune Fitness Park */
        }

        .container {
            position: relative;
            margin: 50px 0;
        }

        /* LA ROUE */
        .wheel-outer {
            width: 400px;
            height: 400px;
            border: 10px solid #333;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 30px rgba(255, 222, 0, 0.2);
        }

        canvas {
            display: block;
        }

        /* LE CURSEUR (L'AIGUILLE) */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #ffde00;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 10;
        }

        /* BOUTON */
        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #ffde00;
            color: #000;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .spin-btn:hover {
            background-color: #e6c800;
            transform: scale(1.05);
        }

        .spin-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* RESULTAT */
        #result {
            margin-top: 20px;
            font-size: 1.8rem;
            font-family: 'Oswald', sans-serif;
            color: #ffde00;
            height: 40px;
        }
    </style>
</head>
<body>

    <h1>TENTE TA <span>CHANCE !</span></h1>
    
    <div class="container">
        <div class="pointer"></div>
        <div class="wheel-outer" id="wheel">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="spin-button">Faire tourner la roue</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-button');
        const wheel = document.getElementById('wheel');
        const resultDisplay = document.getElementById('result');

        // LES RÉCOMPENSES (Tu peux les modifier ici plus tard)
        const rewards = [
            "1 SERVIETTE OFFERTE",
            "4 SEMAINES OFFERTES",
            "1 SHAKER FP",
            "DÉFI POMPES : 3 RÈP",
            "1 COACHING OFFERT",
            "DÉFI GAINAGE : 30 SEC",
            "1 COURS COLLECTIF",
            "1 MOIS OFFERT",
            "GOURDE OFFERTE",
            "DÉFI CHAISE : 45 SEC"
        ];

        const numSegments = rewards.length;
        const segmentAngle = 360 / numSegments;
        let currentRotation = 0;

        // Dessiner la roue
        function drawWheel() {
            for (let i = 0; i < numSegments; i++) {
                const angle = (i * segmentAngle * Math.PI) / 180;
                
                // Dessin du quartier
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + (segmentAngle * Math.PI) / 180);
                ctx.fillStyle = (i % 2 === 0) ? "#1a1a1a" : "#2a2a2a";
                ctx.fill();
                ctx.strokeStyle = "#444";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Texte
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angle + (segmentAngle / 2) * Math.PI / 180);
                ctx.textAlign = "right";
                ctx.fillStyle = (i % 2 === 0) ? "#ffffff" : "#ffde00";
                ctx.font = "bold 14px Roboto";
                ctx.fillText(rewards[i], 180, 5);
                ctx.restore();
            }
        }

        drawWheel();

        // Animation du spin
        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;
            resultDisplay.innerText = "Bonne chance...";
            
            // Calcul d'une rotation aléatoire (au moins 5 tours complets + angle au pif)
            const extraRotation = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + extraRotation; 
            currentRotation += totalSpin;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Calcul du gain à la fin de l'animation (4 secondes)
            setTimeout(() => {
                spinBtn.disabled = false;
                
                // Calcul de l'index gagnant
                // Le curseur est en haut (270 deg), donc on ajuste le calcul
                const actualAngle = (currentRotation % 360);
                const winningIndex = Math.floor((360 - actualAngle + 270) % 360 / segmentAngle);
                
                resultDisplay.innerText = "GAGNÉ : " + rewards[winningIndex];
            }, 4000);
        });
    </script>
</body>
</html>
