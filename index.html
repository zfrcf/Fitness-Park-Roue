<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Park - Tente ta chance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fp-yellow: #ffde00;
            --fp-bg: #000000;
            --fp-grey: #1a1a1a;
        }

        body {
            background-color: var(--fp-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGO EN GROS --- */
        .header-logo {
            margin-top: 40px;
            width: 300px;
            max-width: 80%;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            text-transform: uppercase;
            margin: 20px 0 40px 0;
            text-align: center;
        }

        /* --- ZONE ROUE --- */
        .wheel-container {
            position: relative;
            width: min(90vw, 450px);
            height: min(90vw, 450px);
        }

        #wheel-svg {
            width: 100%; height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .marker {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--fp-yellow);
            z-index: 10;
        }

        .spin-btn {
            margin-top: 30px;
            background: var(--fp-yellow);
            border: none;
            padding: 18px 50px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #bfa700;
        }

        .spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- FORMULAIRE GAGNANT --- */
        #winner-form {
            display: none;
            background: var(--fp-grey);
            padding: 30px;
            border-radius: 4px;
            border: 2px solid var(--fp-yellow);
            margin-top: 30px;
            width: 350px;
            max-width: 90%;
            text-align: center;
        }

        #winner-form h2 {
            font-family: 'Oswald', sans-serif;
            color: var(--fp-yellow);
            margin-top: 0;
        }

        .win-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }

        .submit-win {
            background: var(--fp-yellow);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="https://d1nwmbf35sn2fq.cloudfront.net/s3fs-public/2025-12/LOGO_FITNESS%20PARK_WHITE_2020_FR%20%281%29%20%281%29.svg?VersionId=c9xFUFsleMk4wk4mV8FfPEzY8KueB1XW" alt="Fitness Park" class="header-logo">

    <h1 class="title-main">TENTE TA <span style="color:var(--fp-yellow)">CHANCE !</span></h1>
    
    <div class="wheel-container">
        <div class="marker"></div>
        <svg id="wheel-svg" viewBox="0 0 400 400"></svg>
    </div>

    <button class="spin-btn" id="spin-btn">Faire tourner</button>

    <div id="winner-form">
        <h2>FÉLICITATIONS !</h2>
        <p id="win-message"></p>
        <input type="text" class="win-input" placeholder="Nom" id="last-name" required>
        <input type="text" class="win-input" placeholder="Prénom" id="first-name" required>
        <input type="tel" class="win-input" placeholder="Numéro de téléphone" id="phone" required>
        <button class="submit-win" onclick="alert('Vos informations ont été enregistrées !')">Recevoir mon lot</button>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        const firebaseConfig = {
            apiKey: "AIzaSyA6RIWqdkWkIYYNXdRXfY84ocfMHuyaKkk",
            authDomain: "fitness-park-roue.firebaseapp.com",
            projectId: "fitness-park-roue",
            storageBucket: "fitness-park-roue.firebasestorage.app",
            messagingSenderId: "393113227879",
            appId: "1:393113227879:web:0c73a9276b29ef8103bac2",
            measurementId: "G-FWRZGVQKXF"
        };
        initializeApp(firebaseConfig);
    </script>

    <script>
        // Définition des lots avec leurs probabilités
        const rewardsData = [
            { label: "SERVIETTE FP", weight: 60 },
            { label: "T-SHIRT FP", weight: 30 },
            { label: "SAC À DOS FP", weight: 10 },
            { label: "3M ULTIMATE", weight: 1 },
            { label: "3M ACCESS", weight: 0.5 },
            { label: "1 MOIS GRATUIT", weight: 0.1 },
            { label: "2 MOIS GRATUIT", weight: 0.05 },
            { label: "3 MOIS GRATUIT", weight: 0.01 },
            { label: "6 MOIS GRATUIT", weight: 0.001 }
        ];

        const svg = document.getElementById('wheel-svg');
        const spinBtn = document.getElementById('spin-btn');
        let currentRotation = 0;

        // Dessiner la roue (On divise en 10 segments pour la lisibilité visuelle)
        function drawWheel() {
            const segments = 10; 
            const step = 360 / segments;
            for (let i = 0; i < segments; i++) {
                const angle = i * step;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const x1 = 200 + 190 * Math.cos(Math.PI * angle / 180);
                const y1 = 200 + 190 * Math.sin(Math.PI * angle / 180);
                const x2 = 200 + 190 * Math.cos(Math.PI * (angle + step) / 180);
                const y2 = 200 + 190 * Math.sin(Math.PI * (angle + step) / 180);
                
                path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 190 190 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", i % 2 === 0 ? "#111" : "#1a1a1a");
                path.setAttribute("stroke", "#333");
                svg.appendChild(path);

                // Texte (On affiche les lots principaux sur la roue)
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", "300"); t.setAttribute("y", "205");
                t.setAttribute("fill", i % 2 === 0 ? "white" : "#ffde00");
                t.setAttribute("font-size", "9"); t.setAttribute("font-weight", "900");
                t.setAttribute("transform", `rotate(${angle + step/2}, 200, 200)`);
                t.textContent = rewardsData[i % rewardsData.length].label;
                svg.appendChild(t);
            }
        }

        drawWheel();

        // Logique de calcul par probabilité
        function getWeightedReward() {
            const totalWeight = rewardsData.reduce((acc, item) => acc + item.weight, 0);
            let random = Math.random() * totalWeight;
            for (const reward of rewardsData) {
                if (random < reward.weight) return reward;
                random -= reward.weight;
            }
            return rewardsData[0];
        }

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            document.getElementById('winner-form').style.display = 'none';
            
            const winningReward = getWeightedReward();
            const rewardIndex = rewardsData.indexOf(winningReward);
            
            // Calcul de l'angle pour tomber sur le bon segment visuel
            // (Note: C'est une simulation visuelle, le lot est décidé par le JS avant)
            const extraSpin = 3600; // 10 tours
            const segmentAngle = 360 / 10;
            const targetAngle = 360 - (rewardIndex * segmentAngle) - (segmentAngle / 2);
            
            currentRotation += extraSpin + targetAngle;
            svg.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                document.getElementById('winner-form').style.display = 'block';
                document.getElementById('win-message').innerHTML = `Vous avez gagné : <br><strong>${winningReward.label}</strong>`;
                spinBtn.style.display = 'none';
            }, 5000);
        };
    </script>
</body>
</html>
