<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Park - Jeu de la Roue</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --fp-yellow: #ffde00;
            --fp-black: #1a1d20;
            --fp-dark: #000000;
        }

        body {
            background-color: var(--fp-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- NAVBAR STYLE IMAGE --- */
        nav {
            width: 100%;
            background-color: var(--fp-black);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 50px;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        .nav-left { display: flex; align-items: center; gap: 30px; }
        
        .logo-fp { height: 45px; }

        .nav-links {
            display: flex;
            gap: 20px;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .btn-login-text { color: white; text-decoration: underline; font-size: 14px; cursor: pointer; }
        
        .btn-register {
            background-color: var(--fp-yellow);
            color: black;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border: none;
            cursor: pointer;
        }

        /* --- FORMULAIRE DE CONNEXION --- */
        .login-box {
            background: #111;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-top: 30px;
            width: 320px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }

        .social-auth {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* --- ZONE ROUE --- */
        .game-container {
            text-align: center;
            margin-top: 40px;
        }

        .title-main {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid var(--fp-yellow);
            z-index: 10;
        }

        .spin-trigger {
            margin-top: 30px;
            background: var(--fp-yellow);
            border: none;
            padding: 15px 40px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .spin-trigger:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <img src="https://www.fitnesspark.fr/wp-content/themes/fitnesspark/img/logo-fitness-park.svg" alt="Fitness Park" class="logo-fp">
            <div class="nav-links">
                <span>Abonnements</span>
                <span>Activités & Options</span>
                <span>Nos Clubs</span>
                <span>Level Up</span>
            </div>
        </div>
        <div class="nav-right">
            <span class="btn-login-text">Se connecter</span>
            <button class="btn-register">Je m'inscris</button>
        </div>
    </nav>

    <div class="login-box">
        <h3 style="margin-top:0; font-family:'Oswald'">CONNEXION</h3>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Mot de passe">
        <button class="btn-register" style="width:100%; margin-top:10px;">Valider</button>
        
        <div class="social-auth">
            <button class="social-btn" style="background:#fff; color:#000;"><i class="fab fa-google"></i></button>
            <button class="social-btn" style="background:#000; color:#fff; border:1px solid #333;"><i class="fab fa-apple"></i></button>
        </div>
    </div>

    <div class="game-container">
        <h1 class="title-main">TENTE TA <span style="color:var(--fp-yellow)">CHANCE !</span></h1>
        
        <div class="wheel-wrapper">
            <div class="marker"></div>
            <svg id="wheel-svg" viewBox="0 0 400 400"></svg>
        </div>

        <button class="spin-trigger" id="spin-button">Faire tourner la roue</button>
        <h2 id="result-text" style="color:var(--fp-yellow); font-family:'Oswald'; height:40px;"></h2>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAnalytics } from "firebase/analytics";

        const firebaseConfig = {
            apiKey: "AIzaSyA6RIWqdkWkIYYNXdRXfY84ocfMHuyaKkk",
            authDomain: "fitness-park-roue.firebaseapp.com",
            projectId: "fitness-park-roue",
            storageBucket: "fitness-park-roue.firebasestorage.app",
            messagingSenderId: "393113227879",
            appId: "1:393113227879:web:0c73a9276b29ef8103bac2",
            measurementId: "G-FWRZGVQKXF"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>

    <script>
        const rewards = [
            "1 MOIS OFFERT", "GOURDE OFFERTE", "DÉFI POMPES", 
            "SERVIETTE", "4 SEMAINES", "SHAKER FP", 
            "COACHING 1H", "DÉFI CHAISE", "ACCÈS VIP", "SURPRISE"
        ];

        const svg = document.getElementById('wheel-svg');
        const spinBtn = document.getElementById('spin-button');
        const resultText = document.getElementById('result-text');
        let currentRotation = 0;

        function initWheel() {
            const angleStep = 360 / rewards.length;
            rewards.forEach((text, i) => {
                const startAngle = i * angleStep;
                const endAngle = (i + 1) * angleStep;
                
                // Dessin du quartier
                const x1 = 200 + 180 * Math.cos(Math.PI * startAngle / 180);
                const y1 = 200 + 180 * Math.sin(Math.PI * startAngle / 180);
                const x2 = 200 + 180 * Math.cos(Math.PI * endAngle / 180);
                const y2 = 200 + 180 * Math.sin(Math.PI * endAngle / 180);
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M 200 200 L ${x1} ${y1} A 180 180 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute("fill", i % 2 === 0 ? "#111" : "#222");
                path.setAttribute("stroke", "#444");
                svg.appendChild(path);

                // Texte
                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                const rotation = startAngle + (angleStep / 2);
                textNode.setAttribute("x", "300");
                textNode.setAttribute("y", "205");
                textNode.setAttribute("fill", i % 2 === 0 ? "white" : "#ffde00");
                textNode.setAttribute("font-size", "10");
                textNode.setAttribute("font-weight", "bold");
                textNode.setAttribute("transform", `rotate(${rotation}, 200, 200)`);
                textNode.textContent = text;
                svg.appendChild(textNode);
            });
        }

        initWheel();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            resultText.textContent = "C'est parti...";
            const randomSpin = Math.floor(Math.random() * 360) + 2880; // 8 tours min
            currentRotation += randomSpin;
            svg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                spinBtn.disabled = false;
                const finalAngle = (360 - (currentRotation % 360)) % 360;
                const winIdx = Math.floor(finalAngle / (360 / rewards.length));
                resultText.textContent = "GAGNÉ : " + rewards[winIdx];
            }, 5000);
        };
    </script>
</body>
</html>
